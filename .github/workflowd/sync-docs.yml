name: Sync library docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync docs from libs
        run: |
          set -e

          rm -rf docs/lib
          mkdir -p docs/lib

          LIB_DIR="build_files/lib"
          OUT_DIR="docs/lib"

          if [ ! -d "$LIB_DIR" ]; then
            echo "No libs directory found"
            exit 0
          fi

          for lib in "$LIB_DIR"/*; do
            if [ -d "$lib" ]; then
              libname=$(basename "$lib")
              target="$OUT_DIR/$libname"

              mkdir -p "$target"

              # Case 1: docs folder exists
              if [ -d "$lib/docs" ]; then
                echo "Syncing docs/ for $libname"
                rsync -av --delete "$lib/docs/" "$target/"

              # Case 2: README.md fallback
              elif [ -f "$lib/README.md" ]; then
                echo "Using README.md for $libname"
                cp "$lib/README.md" "$target/README.md"

              # Case 3: nothing
              else
                echo "No documentation found for $libname"
                rmdir "$target" 2>/dev/null || true
              fi
            fi
          done

      - name: Commit updated docs (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/lib

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[AUTO] Sync library docs"
          git push